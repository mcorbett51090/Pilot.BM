name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, feat/**, fix/**]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (astro build)
        run: npm run build

      - name: Verify dist output
        run: |
          test -d dist || (echo "ERROR: dist/ directory not found after build" && exit 1)
          test -f dist/index.html || (echo "ERROR: dist/index.html not found after build" && exit 1)
          echo "Build output verified."
          ls dist/ | head -20
